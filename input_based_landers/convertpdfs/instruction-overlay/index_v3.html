<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aiBrowser Installation</title>
    <meta name="description" content="overlay" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">

    <link rel='stylesheet' id='elementor-frontend-css' href='/instruction-overlay/style_v3.css' media='all' />
  </head>
  <body>
    <div class="wrapperOverlay">
      <!-- Cross Button -->
      <div class="crossBtn">
        X
       </div>
      <!-- Setup Badge -->
      <div class="setupBadge">
        <p>
          OPEN the Downloaded File
        </p>
          
      </div>
      <!-- Download Link -->
      <div class="download-link">
        <p>
          If your download did not start automatically, please
          <a href="#" class="text-link download-ai" download-position="instruction-atf">click here.</a>
        </p>
      </div>
    </div>
    <script type="text/javascript">

        document.addEventListener("DOMContentLoaded", function() {
        if (navigator.userAgent.includes("OPR") || navigator.userAgent.includes("Opera")) {
            document.querySelector(".setupBadge").style.right = "45px";
        }
        });



    </script>
  </body>

</html>
